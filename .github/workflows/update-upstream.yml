name: Update Upstream Version

on:
  schedule:
    - cron: "37 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    name: Discover new versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      versions: ${{ steps.discover.outputs.versions }}
      latest: ${{ steps.discover.outputs.latest }}
      has_updates: ${{ steps.discover.outputs.has_updates }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - id: discover
        shell: bash
        run: |
          versions="$(node scripts/update-version.mjs --list-newer)"
          latest="$(node -e 'const versions = JSON.parse(process.argv[1]); console.log(versions.at(-1) ?? "")' "$versions")"
          {
            echo "versions=$versions"
            echo "latest=$latest"
            if [ "$versions" = "[]" ]; then
              echo "has_updates=false"
            else
              echo "has_updates=true"
            fi
          } >> "$GITHUB_OUTPUT"

  test:
    name: Test v${{ matrix.ses_version }}
    needs: discover
    if: needs.discover.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ses_version: ${{ fromJson(needs.discover.outputs.versions) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Retarget to ${{ matrix.ses_version }}
        run: node scripts/update-version.mjs --version "${{ matrix.ses_version }}"

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: aws-ses-v2-local:test
          build-args: |
            SES_VERSION=${{ matrix.ses_version }}

      - name: Start container
        run: |
          docker run -d --name ses-test -p 8005:8005 aws-ses-v2-local:test
          for i in $(seq 1 30); do
            if wget --spider -q http://localhost:8005 2>/dev/null; then
              echo "SES local is up"
              exit 0
            fi
            sleep 1
          done
          echo "SES local failed to start"
          docker logs ses-test
          exit 1

      - name: Smoke test — send email
        run: |
          aws sesv2 send-email \
            --endpoint-url http://localhost:8005 \
            --region us-east-1 \
            --from-email-address test@example.com \
            --destination '{"ToAddresses":["recipient@example.com"]}' \
            --content '{"Simple":{"Subject":{"Data":"Test"},"Body":{"Text":{"Data":"Hello"}}}}'
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

      - name: Verify email was captured
        run: |
          response=$(wget -qO- http://localhost:8005/store)
          echo "$response" | grep -q "test@example.com"

      - name: Cleanup
        if: always()
        run: docker rm -f ses-test 2>/dev/null || true

  pull-request:
    name: Open update PR
    needs:
      - discover
      - test
    if: always() && needs.discover.outputs.has_updates == 'true' && needs.test.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - run: node scripts/update-version.mjs --version "${{ needs.discover.outputs.latest }}"

      - id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/update-ses-${{ needs.discover.outputs.latest }}
          delete-branch: true
          title: "chore: target aws-ses-v2-local ${{ needs.discover.outputs.latest }}"
          commit-message: "chore: target aws-ses-v2-local ${{ needs.discover.outputs.latest }}"
          body: |
            Updates the default `aws-ses-v2-local` version to `${{ needs.discover.outputs.latest }}`.

            The updater tested every newly discovered version before opening this PR:

            ```json
            ${{ needs.discover.outputs.versions }}
            ```

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.create-pr.outputs.pull-request-number }}" --auto --squash
        continue-on-error: true
